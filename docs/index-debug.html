<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team HIIT - Debug Localhost</title>
    
    <!-- ÍCONE -->
    <link rel="icon" type="image/png" href="/LOGOS/ICONE-TH.png" />
    
    <!-- Google Fonts - Urbanist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- CSS INLINE PARA DEBUG -->
    <style>
      /* Reset imediato */
      html, body {
        padding: 0 !important;
        margin: 0 !important;
        background-color: #ffffff !important;
        height: 100% !important;
        overflow-x: hidden !important;
        font-family: 'Urbanist', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif !important;
      }
      
      #root {
        padding: 0 !important;
        margin: 0 !important;
        background-color: #ffffff !important;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Fallback de carregamento para debug -->
      <div id="loading-fallback" style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Urbanist', sans-serif;
      ">
        <div style="text-align: center;">
          <div style="
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
          "></div>
          <p style="color: #6b7280; font-size: 16px;">Carregando Team HIIT Debug...</p>
        </div>
      </div>
    </div>
    
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    
    <script>
      console.log('🚀 [DEBUG] Iniciando página de debug...');
      console.log('📱 [DEBUG] User Agent:', navigator.userAgent);
      console.log('🌐 [DEBUG] URL:', window.location.href);
      console.log('⏰ [DEBUG] Timestamp:', new Date().toLocaleString('pt-BR'));
    </script>
    
    <script type="module" src="/src/main-debug.jsx"></script>
  </body>
</html>
