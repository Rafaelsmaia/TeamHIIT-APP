    <!-- CSS INLINE PARA PWA -->
    <style>
      /* Reset imediato para PWA */
      html, body {
        padding: 0 !important;
        margin: 0 !important;
        background-color: #000000 !important;
        height: 100% !important;
        overflow-x: hidden !important;
        font-family: 'Urbanist', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif !important;
      }
      
      /* Forçar fonte Urbanist em todos os elementos */
      *, *::before, *::after {
        font-family: 'Urbanist', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif !important;
      }
      
      #root {
        padding: 0 !important;
        margin: 0 !important;
        background-color: #000000 !important;
      }
      
      /* PWA com status bar translucent */
      @media (display-mode: standalone) {
        body {
          background-color: #000000 !important;
          padding-top: 0 !important;
        }
        
        /* Header ocupa TODA a tela incluindo status bar */
        header {
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          right: 0 !important;
          width: 100% !important;
          z-index: 50 !important;
          background-color: #111827 !important;
          margin: 0 !important;
          padding: 0 !important;
          padding-top: env(safe-area-inset-top, 44px) !important;
        }
        
        /* Conteúdo principal compensado - REDUZIDO */
        .min-h-screen {
          padding-top: calc(2.5rem + env(safe-area-inset-top, 44px)) !important;
        }
        
        /* Banner/Carousel sem espaçamento extra */
        .carousel, .banner, .hero, [class*="banner"], [class*="hero"], [class*="carousel"] {
          margin-top: 0 !important;
          padding-top: 0 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      (() => {
        const isLikelyNative =
          window.Capacitor !== undefined ||
          window.location.protocol === 'capacitor:' ||
          (
            window.location.hostname === 'localhost' &&
            window.location.port === '' &&
            /(Android|iPhone|iPad|iPod)/i.test(navigator.userAgent)
          );

        if (isLikelyNative) {
          return;
        }

        const root = document.getElementById('root');
        if (!root) {
          return;
        }

        const fallback = document.createElement('div');
        fallback.id = 'loading-fallback';
        fallback.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background-color: #000000;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          overflow: hidden;
        `;
        fallback.innerHTML = `
          <img
            src="/IMAGES/SPLASH SCREEN.jpg"
            alt="Team HIIT Splash Screen"
            style="
              width: 100%;
              height: 100%;
              object-fit: cover;
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
            "
          />
        `;

        root.appendChild(fallback);
      })();
    </script>
    
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    

    
    <!-- Trainings Data -->
    <script src="/trainings.js"></script>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Detectar se está no Capacitor (nativo) - verificação deve vir ANTES
      const isCapacitor = window.Capacitor !== undefined;
      
      
      // Registrar Service Worker APENAS se NÃO for Capacitor
      if ('serviceWorker' in navigator && !isCapacitor) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
            })
            .catch((error) => {
            });
        });
      } else if (isCapacitor) {
        console.log('📱 [INDEX] Service Worker desabilitado (Capacitor nativo)');
      }

      // Detectar se está rodando como PWA e aplicar fixes
      window.addEventListener('DOMContentLoaded', () => {
        
        const isPWA = window.matchMedia('(display-mode: standalone)').matches;
        
        if (isPWA && !isCapacitor) {
          document.body.classList.add('pwa-mode');
          document.body.style.backgroundColor = '#000000';
          
          // Garantir que o header ocupe toda a tela
          setTimeout(() => {
            const header = document.querySelector('header');
            if (header) {
              header.style.position = 'fixed';
              header.style.top = '0';
              header.style.left = '0';
              header.style.right = '0';
              header.style.width = '100%';
              header.style.zIndex = '50';
              header.style.backgroundColor = '#111827';
              header.style.margin = '0';
              header.style.padding = '0';
              header.style.paddingTop = 'env(safe-area-inset-top, 44px)';
            }
          }, 100);
        } else if (isCapacitor) {
          console.log('📱 [INDEX] Modo Capacitor - configurações nativas');
          document.body.style.backgroundColor = '#000000';
        }
      });
    </script>
